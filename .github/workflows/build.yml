name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important pour compter les commits (versionCode)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore novelreader.keystore \
            -alias novelreader \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass novelreader \
            -keypass novelreader \
            -dname "CN=NovelReader, OU=Dev, O=NovelReader, L=City, ST=State, C=FR"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (signé)
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: novelreader
          KEY_ALIAS: novelreader
          KEY_PASSWORD: novelreader

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: NovelReader-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NovelReader-Debug
          path: app/build/outputs/apk/debug/*.apk
