name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v -keystore novelreader.keystore \
            -alias novelreader -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass novelreader -keypass novelreader \
            -dname "CN=NovelReader, OU=Dev, O=NovelReader, L=City, ST=State, C=FR"

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: novelreader
          KEY_ALIAS: novelreader
          KEY_PASSWORD: novelreader
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Get version name
        id: version
        run: |
          echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "run=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovelReader-v${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: NovelReader v${{ steps.version.outputs.version }}
          body: |
            ## ✨ Téléchargement

            L'APK est attaché ci-dessous. Télécharge-le et ouvre-le sur ton Android pour installer NovelReader.

            ## 🆕 Nouveautés

            Dernière version stable de NovelReader. Consulte le [README](https://github.com/elfred434/novel-readers#readme) pour la liste complète des fonctionnalités.

            ## 📦 Installation

            1. Télécharge le fichier `.apk` ci-dessous
            2. Ouvre-le sur ton téléphone Android
            3. Autorise l'installation d'applications tierces si demandé
            4. Profite de NovelReader !
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
